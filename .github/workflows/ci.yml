name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests evals

      - name: Unit tests (offline, no API keys required)
        run: pytest -v

  # The digest-writer eval hits the OpenAI + LangSmith APIs, so it's kept out
  # of the required CI gate and run manually / on a schedule instead of on
  # every PR. See evals/run_eval.py and the README's "Evals" section.
  eval:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m evals.run_eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
